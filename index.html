<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Next Gen International School</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar">

<h2 id="schoolName"></h2>

<ul>

<li><a href="#about">About</a></li>
<li><a href="#programs">Programs</a></li>
<li><a href="#gallery">Gallery</a></li>
<li><a href="#admissions">Admissions</a></li>
<li><a href="#contact">Contact</a></li>

</ul>

</nav>


<!-- HERO -->

<section class="hero">

<img id="banner">

<div class="hero-text">

<h1 id="schoolNameHero"></h1>

<p id="tagline"></p>

<a class="cta" href="#admissions">Apply Now</a>

</div>

</section>


<!-- ABOUT -->

<section id="about">

<h2>About Us</h2>

<p id="aboutText"></p>

</section>


<!-- PROGRAMS -->

<section id="programs">

<h2>Our Programs</h2>

<div id="programList" class="grid"></div>

</section>


<!-- GALLERY -->

<section id="gallery">

<h2>School Gallery</h2>

<div id="galleryList" class="gallery-grid"></div>

</section>


<!-- TESTIMONIALS -->

<section id="testimonials">

<h2>Parents Say</h2>

<div id="testimonialList" class="grid"></div>

</section>


<!-- ADMISSION FORM -->

<section id="admissions">

<h2>Admissions Open</h2>

<p id="admissionYear"></p>

<form id="enquiryForm">

<input type="text" placeholder="Parent Name" required>

<input type="text" placeholder="Child Name" required>

<input type="tel" placeholder="Phone Number" required>

<select>

<option>Playgroup</option>
<option>Nursery</option>
<option>LKG</option>
<option>UKG</option>

</select>

<button type="submit">Submit Enquiry</button>

</form>

</section>


<!-- CONTACT -->

<section id="contact">

<h2>Contact Us</h2>

<p id="address"></p>

<p id="phone"></p>

<p id="email"></p>

<iframe id="map"></iframe>

</section>


<!-- FOOTER -->

<footer>

<div class="social">

<a id="facebook" target="_blank"><i class="fab fa-facebook"></i></a>

<a id="instagram" target="_blank"><i class="fab fa-instagram"></i></a>

<a id="youtube" target="_blank"><i class="fab fa-youtube"></i></a>

</div>

<p>© <span id="year"></span> <span id="schoolNameFooter"></span></p>

</footer>


<!-- WHATSAPP BUTTON -->

<a id="whatsappBtn" target="_blank" class="whatsapp">

<i class="fab fa-whatsapp"></i>

</a>

<script src="script.js"></script>

</body>

</html>
